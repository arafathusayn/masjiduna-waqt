name: release http-server

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: waqt-server-linux-x64
            exe: ""
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: waqt-server-linux-arm64
            exe: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: waqt-server-darwin-arm64
            exe: ""
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: waqt-server-darwin-x64
            exe: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: waqt-server-windows-x64.exe
            exe: .exe

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release binary
        env:
          RUSTFLAGS: ""
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }} --manifest-path http-server/Cargo.toml

      - name: Prepare artifact
        shell: bash
        run: cp http-server/target/${{ matrix.target }}/release/salah-waqt-http${{ matrix.exe }} ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/waqt-server-linux-x64
            artifacts/waqt-server-linux-arm64
            artifacts/waqt-server-darwin-arm64
            artifacts/waqt-server-darwin-x64
            artifacts/waqt-server-windows-x64.exe
